<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランキング</title>
    <style>
        :root { --primary-bg: #120136; --accent-pink: #ff007f; --accent-blue: #00f0ff; --accent-yellow: #fffb00; --card-bg: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: radial-gradient(circle, #20014f 0%, #050014 100%); color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 600px; }
        h1 { font-size: 2rem; color: var(--accent-yellow); text-shadow: 0 0 10px rgba(255, 251, 0, 0.6), 3px 3px 0px var(--accent-pink); letter-spacing: 2px; }
        .subtitle { font-size: 0.9rem; color: var(--accent-blue); font-weight: bold; }
        .container { width: 100%; max-width: 600px; background: var(--card-bg); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid rgba(255, 255, 255, 0.1); }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #aaa; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-pink); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .ranking-item { display: flex; align-items: center; padding: 12px 15px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; border-left: 5px solid #ccc; }
        .ranking-item.rank-1 { border-left-color: var(--accent-yellow); background: rgba(255, 251, 0, 0.1); }
        .ranking-item.rank-2 { border-left-color: #e6e6e6; background: rgba(230, 230, 230, 0.08); }
        .ranking-item.rank-3 { border-left-color: #cd7f32; background: rgba(205, 127, 50, 0.08); }
        .rank-num { font-size: 1.5rem; font-weight: 900; width: 40px; text-align: center; }
        .player-info { flex-grow: 1; padding-left: 15px; }
        .player-name { font-size: 1.1rem; font-weight: bold; }
        .player-dept { font-size: 0.75rem; color: #aaa; }
        .player-score { font-size: 1.4rem; font-weight: bold; color: var(--accent-blue); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--accent-blue); margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #fff; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(45deg, var(--accent-pink), #ff0055); border: none; border-radius: 8px; color: #fff; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #ff3333; padding: 6px 10px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .qr-section { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #888; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.3); margin-top: 8px; border-radius: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>RANKING</h1>
        <div class="subtitle">REALTIME LEADERBOARD</div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-view">ランキングを見る</button>
            <button class="tab-btn" id="btn-input">スコアを登録する</button>
        </div>

        <div id="tab-view" class="tab-content active">
            <div class="form-group">
                <label for="filter-dept">部門を切り替え</label>
                <select id="filter-dept">
                    <option value="all">すべての部門</option>
                    <option value="kids">キッズ部門</option>
                    <option value="general">一般人部門</option>
                    <option value="pro">ウルスラ内部門</option>
                </select>
            </div>
            <ul class="ranking-list" id="ranking-list"></ul>
        </div>

        <div id="tab-input" class="tab-content">
            <div id="admin-auth">
                <div style="text-align: center; padding: 20px;">
                    <p style="margin-bottom: 15px; color: #ccc;">スタッフ専用パスワード</p>
                    <input type="password" id="admin-pass" placeholder="パスワードを入力してください" style="text-align: center; margin-bottom: 15px;">
                    <button class="btn" id="btn-auth">認証する</button>
                </div>
            </div>

            <div id="score-form-container" style="display: none;">
                <div class="form-group">
                    <label for="player-name">プレイヤー名 （ひらがな&フルネームで）</label>
                    <input type="text" id="player-name" placeholder="例：やまだたろう">
                </div>
                <div class="form-group">
                    <label for="player-dept-select">エントリー部門</label>
                    <select id="player-dept-select">
                        <option value="kids">キッズ部門</option>
                        <option value="general" selected>一般人</option>
                        <option value="pro">ウルスラ内部門</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="player-score-input">獲得スコア (pts)</label>
                    <input type="number" id="player-score-input" placeholder="例：350">
                </div>
                <button class="btn" id="btn-submit">スコアを送信！</button>
                
                <!-- 管理用データ削除エリア -->
                <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
                    <p style="color: var(--accent-blue); font-weight: bold; font-size: 0.9rem; margin-bottom: 10px;">【データ管理】登録済みのデータ一覧</p>
                    <div id="admin-data-list"></div>
                </div>

                <p style="text-align: center; margin-top: 25px; font-size: 0.8rem; color: #ff007f; cursor: pointer;" id="btn-lock">← 画面をロックする</p>
            </div>
        </div>
    </div>

    <div class="qr-section">
        <p>QRコードを読み取るとリアルタイムでランキングがチェックできます！</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebaseの設定
        const firebaseConfig = {
            apiKey: "AIzaSyCsLgkXr51Dgcx5eixn-Zq8gZg4qziuQVo",
            authDomain: "html-53bb1.firebaseapp.com",
            projectId: "html-53bb1",
            storageBucket: "html-53bb1.firebasestorage.app",
            messagingSenderId: "486347499592",
            appId: "1:486347499592:web:17f94d3d064f42eaedd07d",
            measurementId: "G-CE36RP9WGH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let globalScores = [];

        const q = query(collection(db, "scores"), orderBy("score", "desc"));
        onSnapshot(q, (querySnapshot) => {
            globalScores = [];
            querySnapshot.forEach((d) => {
                globalScores.push({ id: d.id, ...d.data() });
            });
            renderRanking();
            renderAdminList();
        });

        function renderRanking() {
            const filterDept = document.getElementById('filter-dept').value;
            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = '';

            let filtered = [...globalScores];
            if (filterDept !== 'all') {
                filtered = filtered.filter(s => s.dept === filterDept);
            }

            filtered.forEach((item, index) => {
                const li = document.createElement('li');
                let rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                li.className = `ranking-item ${rankClass}`;

                let deptText = item.dept === 'kids' ? "キッズ" : item.dept === 'pro' ? "一般" : "一般";
                li.innerHTML = `
                    <div class="rank-num">${index + 1}</div>
                    <div class="player-info">
                        <div class="player-name">${escapeHTML(item.name)}</div>
                        <div class="player-dept">【${deptText}】</div>
                    </div>
                    <div class="player-score">${item.score}<span>pts</span></div>
                `;
                listEl.appendChild(li);
            });
        }

        // 管理画面用のデータ一覧表示と削除イベントの紐付け
        function renderAdminList() {
            const adminListEl = document.getElementById('admin-data-list');
            adminListEl.innerHTML = '';

            if (globalScores.length === 0) {
                adminListEl.innerHTML = '<p style="color:#888; font-size:0.8rem;">データがありません</p>';
                return;
            }

            globalScores.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'admin-list-item';
                div.innerHTML = `
                    <span>${escapeHTML(item.name)} (${item.score}pts)</span>
                    <button class="btn-delete" data-id="${item.id}">削除</button>
                `;
                adminListEl.appendChild(div);
            });

            // すべての削除ボタンに削除処理を設定
            adminListEl.querySelectorAll('.btn-delete').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    if (confirm('このデータを削除してもよろしいですか？')) {
                        try {
                            await deleteDoc(doc(db, "scores", id));
                            alert('削除しました');
                        } catch (error) {
                            alert('削除に失敗しました');
                        }
                    }
                });
            });
        }

        async function submitScore() {
            const name = document.getElementById('player-name').value.trim();
            const dept = document.getElementById('player-dept-select').value;
            const score = parseInt(document.getElementById('player-score-input').value);

            if (!name || isNaN(score)) { alert('正しく入力してください'); return; }

            try {
                await addDoc(collection(db, "scores"), {
                    name: name,
                    dept: dept,
                    score: score,
                    createdAt: new Date()
                });
                document.getElementById('player-name').value = '';
                document.getElementById('player-score-input').value = '';
            } catch (e) {
                console.error(e);
                alert('送信エラーが発生しました');
            }
        }

        document.getElementById('filter-dept').addEventListener('change', renderRanking);
        document.getElementById('btn-submit').addEventListener('click', submitScore);
        document.getElementById('btn-view').addEventListener('click', () => switchTab('view'));
        document.getElementById('btn-input').addEventListener('click', () => switchTab('input'));
        document.getElementById('btn-auth').addEventListener('click', checkPassword);
        document.getElementById('btn-lock').addEventListener('click', lockAdmin);

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tabId === 'view') {
                document.getElementById('btn-view').classList.add('active');
                document.getElementById('tab-view').classList.add('active');
            } else {
                document.getElementById('btn-input').classList.add('active');
                document.getElementById('tab-input').classList.add('active');
            }
        }

        function checkPassword() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '211211') {
                document.getElementById('admin-auth').style.display = 'none';
                document.getElementById('score-form-container').style.display = 'block';
                document.getElementById('admin-pass').value = '';
            } else { alert('パスワードが違います'); }
        }

        function lockAdmin() {
            document.getElementById('admin-auth').style.display = 'block';
            document.getElementById('score-form-container').style.display = 'none';
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
    </script>
</body>
</html>
