<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANKING & SCORE MANAGER</title>
    <style>
        :root { 
            --bg-start: #050814;
            --bg-end: #0c132c;
            --color-blue: #00d2ff;
            --color-purple: #9d4edd;
            --color-cyan: #00f5d4;
            --gold: #ffe066;
            --silver: #e2e8f0;
            --bronze: #e59866;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            background-attachment: fixed;
            color: #ffffff; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 15px; 
            -webkit-font-smoothing: antialiased;
        }
        
        header { 
            text-align: center; 
            margin-bottom: 25px; 
            width: 100%; 
            max-width: 650px; 
            position: relative;
        }
        
        header h1 { 
            font-size: 2.5rem; 
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }
        
        .subtitle { 
            font-size: 0.85rem; 
            color: var(--color-blue); 
            margin-top: 4px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .nav-link-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 18px;
            background: rgba(0, 245, 212, 0.1);
            border: 1px solid var(--color-cyan);
            border-radius: 20px;
            color: var(--color-cyan);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s;
        }
        .nav-link-btn:hover {
            background: var(--color-cyan);
            color: #050814;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4);
        }
        
        .container { 
            width: 100%; 
            max-width: 650px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-radius: 16px; 
            padding: 20px; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); gap: 5px; }
        .tab-btn { flex: 1; padding: 12px 8px; background: none; border: none; color: rgba(255, 255, 255, 0.4); font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.3s; position: relative; letter-spacing: 0.5px; }
        .tab-btn.active { color: #ffffff; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 10%; width: 80%; height: 2px; background: linear-gradient(90deg, var(--color-blue), var(--color-purple)); box-shadow: 0 0 10px var(--color-blue); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .filter-search-container { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-search-container .form-group { flex: 1; min-width: 140px; margin-bottom: 0; }

        .ranking-list { list-style: none; }
        
        .ranking-item { 
            display: flex; 
            align-items: center; 
            padding: 16px; 
            margin-bottom: 12px; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px; 
            transition: all 0.3s ease;
            scroll-margin-top: 30px;
        }
        
        .ranking-item.search-highlight {
            border: 2px solid var(--color-cyan) !important;
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.6) !important;
            background: rgba(0, 245, 212, 0.15) !important;
            transform: scale(1.02);
        }
        
        .rank-num { font-size: 1.2rem; font-weight: 800; width: 40px; text-align: center; color: rgba(255, 255, 255, 0.4); }
        .rank-1 { background: linear-gradient(135deg, rgba(255, 224, 102, 0.15), rgba(255, 224, 102, 0.02)); border: 1px solid rgba(255, 224, 102, 0.4); }
        .rank-1 .rank-num { color: var(--gold); font-size: 1.6rem; }
        .rank-2 { background: linear-gradient(135deg, rgba(226, 232, 240, 0.15), rgba(226, 232, 240, 0.02)); border: 1px solid rgba(226, 232, 240, 0.3); }
        .rank-2 .rank-num { color: var(--silver); font-size: 1.4rem; }
        .rank-3 { background: linear-gradient(135deg, rgba(229, 152, 102, 0.15), rgba(229, 152, 102, 0.02)); border: 1px solid rgba(229, 152, 102, 0.3); }
        .rank-3 .rank-num { color: var(--bronze); font-size: 1.3rem; }
        
        .player-info { flex-grow: 1; padding-left: 12px; }
        .player-name { font-size: 1.1rem; font-weight: 700; color: #ffffff; }
        .entry-no-badge { font-size: 0.8rem; color: var(--color-cyan); font-weight: 700; margin-left: 6px; background: rgba(0, 245, 212, 0.1); padding: 2px 6px; border-radius: 4px; }
        .player-dept { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); margin-top: 3px; font-weight: 600; }
        
        .player-score { font-size: 1.5rem; font-weight: 800; color: var(--color-blue); font-style: italic; }
        .rank-1 .player-score { color: var(--gold); }
        .player-score span { font-size: 0.75rem; margin-left: 2px; color: rgba(255, 255, 255, 0.4); font-style: normal; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; color: rgba(255, 255, 255, 0.7); margin-bottom: 6px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: #ffffff; font-size: 0.95rem; }
        input:focus, select:focus { outline: none; border-color: var(--color-blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        
        .btn { width: 100%; padding: 14px; background: linear-gradient(90deg, var(--color-blue), var(--color-purple)); border: none; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn:hover { filter: brightness(1.1); box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4); }
        
        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .btn-select-queue {
            background: var(--color-cyan);
            color: #050814;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-delete { background: #ef4444; padding: 6px 12px; border: none; border-radius: 6px; color: white; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-delete:hover { background: #dc2626; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(0,0,0,0.3); margin-top: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }

        /* カスタム通知トースト & 確認ダイアログ */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
        }
        .toast {
            padding: 12px 18px;
            border-radius: 10px;
            background: rgba(12, 19, 44, 0.95);
            border: 1px solid var(--color-cyan);
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            pointer-events: auto;
            animation: toastIn 0.3s ease;
            text-align: center;
        }
        .toast.toast-error {
            border-color: #ef4444;
            background: rgba(40, 10, 15, 0.95);
            color: #fca5a5;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* モーダルオーバーレイ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-box {
            background: #0c132c;
            border: 1px solid var(--color-cyan);
            border-radius: 16px;
            padding: 25px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
        }
        .modal-title { font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .modal-message { font-size: 0.95rem; color: rgba(255,255,255,0.8); margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; }
        .btn-modal-cancel { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; }
        .btn-modal-confirm { flex: 1; padding: 12px; background: #ef4444; border: none; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; }
        .btn-modal-confirm:hover { background: #dc2626; }
    </style>
</head>
<body>

    <!-- トースト表示領域 -->
    <div id="toast-container" class="toast-container"></div>

    <!-- カスタム確認ダイアログ -->
    <div id="confirm-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-title" id="modal-title">確認</div>
            <div class="modal-message" id="modal-message">実行してもよろしいですか？</div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" id="btn-modal-cancel">キャンセル</button>
                <button class="btn-modal-confirm" id="btn-modal-confirm">実行する</button>
            </div>
        </div>
    </div>

    <header>
        <h1>LEADERBOARD</h1>
        <div class="subtitle">Festival Live Ranking</div>
        <a href="https://meko04010804-a11y.github.io/Ticket/" class="nav-link-btn">🎫 デジタル整理券を発行・確認する →</a>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-view">🏆 ランキング</button>
            <button class="tab-btn" id="btn-queue">⏳ 待機列・整理券</button>
            <button class="tab-btn" id="btn-input">📝 スコア登録 (スタッフ)</button>
        </div>

        <!-- タブ1: ランキング画面 -->
        <div id="tab-view" class="tab-content active">
            <div class="filter-search-container">
                <div class="form-group">
                    <label for="filter-dept">部門切り替え</label>
                    <select id="filter-dept">
                        <option value="all">すべての部門</option>
                        <option value="kids">キッズ部門</option>
                        <option value="general">一般部門</option>
                        <option value="ursula">ウルスラ内部門</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="search-name">自分の順位を検索</label>
                    <input type="text" id="search-name" placeholder="名前 または No.">
                </div>
            </div>

            <ul class="ranking-list" id="ranking-list"></ul>
        </div>

        <!-- タブ2: 整理券の待機列一覧 -->
        <div id="tab-queue" class="tab-content">
            <p style="font-size:0.85rem; color:rgba(255,255,255,0.7); margin-bottom:15px;">
                整理券を発行してプレイ待機中の参加者一覧です。「スコア入力」を押すとスタッフ登録画面へデータを自動セットできます。
            </p>

            <div class="form-group" style="margin-bottom: 15px;">
                <input type="text" id="search-queue" placeholder="待機列を検索 (名前 または No.)">
            </div>

            <div id="queue-list-container"></div>
        </div>

        <!-- タブ3: スコア登録 & 管理画面 -->
        <div id="tab-input" class="tab-content">
            <div id="admin-auth">
                <div style="text-align: center; padding: 15px;">
                    <p style="margin-bottom: 12px; font-weight: 600;">スタッフ専用パスワード</p>
                    <input type="password" id="admin-pass" placeholder="パスワードを入力" style="text-align: center; margin-bottom: 15px;">
                    <button class="btn" id="btn-auth">認証する</button>
                </div>
            </div>

            <div id="score-form-container" style="display: none;">
                <div style="background: rgba(0,245,212,0.1); border:1px solid var(--color-cyan); padding:10px 14px; border-radius:8px; margin-bottom:15px; font-size:0.8rem; color:var(--color-cyan);">
                    💡 整理券の「待機列」タブから選択すると、エントリーNoと名前が自動セットされます！
                </div>

                <div class="form-group">
                    <label for="player-entry-no">エントリーNo.（整理券の番号）</label>
                    <input type="number" id="player-entry-no" placeholder="例：25">
                </div>
                <div class="form-group">
                    <label for="player-name">プレイヤー名 / チーム名</label>
                    <input type="text" id="player-name" placeholder="例：Yamada Tarou">
                </div>
                <div class="form-group">
                    <label for="player-dept-select">エントリー部門</label>
                    <select id="player-dept-select">
                        <option value="kids">キッズ部門</option>
                        <option value="general" selected>一般部門</option>
                        <option value="ursula">ウルスラ内部門</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="player-score-input">獲得スコア (pts)</label>
                    <input type="number" id="player-score-input" placeholder="例：350">
                </div>
                <button class="btn" id="btn-submit">スコアを登録・確定する</button>

                <!-- 整理券カウンターリセット -->
                <div style="margin-top: 25px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px;">
                    <p style="color: var(--color-cyan); font-weight: 600; font-size: 0.85rem; margin-bottom: 8px;">【管理】整理券番号リセット</p>
                    <button class="btn" id="btn-reset-ticket" style="background: linear-gradient(90deg, #ef4444, #b91c1c); margin-bottom: 6px;">整理券の発行番号を0に戻す</button>
                </div>

                <!-- 登録済みデータ削除 -->
                <div style="margin-top: 20px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px;">
                    <p style="color: var(--color-blue); font-weight: 600; font-size: 0.85rem; margin-bottom: 8px;">【管理】登録済みデータの削除</p>
                    <div id="admin-data-list"></div>
                </div>

                <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: #ef4444; cursor: pointer; text-decoration: underline;" id="btn-lock">← 画面をロックする</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsLgkXr51Dgcx5eixn-Zq8gZg4qziuQVo",
            authDomain: "html-53bb1.firebaseapp.com",
            projectId: "html-53bb1",
            storageBucket: "html-53bb1.firebasestorage.app",
            messagingSenderId: "486347499592",
            appId: "1:486347499592:web:17f94d3d064f42eaedd07d",
            measurementId: "G-CE36RP9WGH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let globalScores = [];

        // カスタムUI通知関数（alert/confirm不使用）
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'toast-error' : ''}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 3000);
        }

        let pendingConfirmAction = null;
        function showConfirm(title, message, onConfirm) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            pendingConfirmAction = onConfirm;
            document.getElementById('confirm-modal').style.display = 'flex';
        }

        document.getElementById('btn-modal-cancel').addEventListener('click', () => {
            document.getElementById('confirm-modal').style.display = 'none';
            pendingConfirmAction = null;
        });

        document.getElementById('btn-modal-confirm').addEventListener('click', async () => {
            document.getElementById('confirm-modal').style.display = 'none';
            if (pendingConfirmAction) {
                const action = pendingConfirmAction;
                pendingConfirmAction = null;
                await action();
            }
        });

        // URLパラメータ(?no=25など)で検索自動入力
        const urlParams = new URLSearchParams(window.location.search);
        const autoNo = urlParams.get('no');
        if (autoNo) {
            document.getElementById('search-name').value = autoNo;
        }

        const q = query(collection(db, "scores"), orderBy("createdAt", "desc"));
        onSnapshot(q, (querySnapshot) => {
            globalScores = [];
            querySnapshot.forEach((d) => {
                globalScores.push({ id: d.id, ...d.data() });
            });
            renderRanking();
            renderQueue();
            renderAdminList();
        });

        function renderRanking() {
            const filterDept = document.getElementById('filter-dept').value;
            const searchKeyword = document.getElementById('search-name').value.trim().toLowerCase();
            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = '';

            let playedScores = globalScores.filter(s => s.score !== null && s.score !== undefined);
            playedScores.sort((a, b) => b.score - a.score);

            if (filterDept !== 'all') {
                playedScores = playedScores.filter(s => s.dept === filterDept);
            }

            let firstMatchElement = null;

            playedScores.forEach((item, index) => {
                const li = document.createElement('li');
                
                let rankClass = '';
                let medalEmoji = '';
                if (index === 0) { rankClass = 'rank-1'; medalEmoji = '🥇 '; }
                else if (index === 1) { rankClass = 'rank-2'; medalEmoji = '🥈 '; }
                else if (index === 2) { rankClass = 'rank-3'; medalEmoji = '🥉 '; }
                
                const nameMatch = item.name && item.name.toLowerCase().includes(searchKeyword);
                const noMatch = item.entryNo && String(item.entryNo) === searchKeyword;
                const isMatched = searchKeyword !== '' && (nameMatch || noMatch);

                let highlightClass = isMatched ? ' search-highlight' : '';
                li.className = `ranking-item ${rankClass}${highlightClass}`;

                let deptText = item.dept === 'kids' ? "キッズ" : item.dept === 'ursula' ? "ウルスラ内" : "一般";
                let entryNoText = item.entryNo ? `<span class="entry-no-badge">No.${escapeHTML(String(item.entryNo))}</span>` : '';

                li.innerHTML = `
                    <div class="rank-num">${medalEmoji}${index + 1}</div>
                    <div class="player-info">
                        <div class="player-name">${escapeHTML(item.name)}${entryNoText}</div>
                        <div class="player-dept">【${deptText}部門】</div>
                    </div>
                    <div class="player-score">${item.score}<span>pts</span></div>
                `;
                
                listEl.appendChild(li);

                if (isMatched && !firstMatchElement) {
                    firstMatchElement = li;
                }
            });

            if (playedScores.length === 0) {
                listEl.innerHTML = '<p style="text-align:center; color:rgba(255,255,255,0.4); padding:20px;">現在登録済みのスコアはありません</p>';
            }

            if (firstMatchElement) {
                firstMatchElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function renderQueue() {
            const container = document.getElementById('queue-list-container');
            container.innerHTML = '';

            const searchKeyword = document.getElementById('search-queue')?.value.trim().toLowerCase() || '';

            let queueItems = globalScores.filter(s => s.score === null || s.score === undefined);

            if (searchKeyword) {
                queueItems = queueItems.filter(item => {
                    const nameMatch = item.name && item.name.toLowerCase().includes(searchKeyword);
                    const noMatch = item.entryNo && String(item.entryNo) === searchKeyword;
                    return nameMatch || noMatch;
                });
            }

            queueItems.sort((a, b) => a.entryNo - b.entryNo);

            if (queueItems.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:rgba(255,255,255,0.4); padding:20px;">${searchKeyword ? '該当する待機中の整理券はありません' : '現在待機中の整理券はありません'}</p>`;
                return;
            }

            queueItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                div.innerHTML = `
                    <div>
                        <span style="font-weight:800; color:var(--color-cyan);">No.${item.entryNo}</span>
                        <span style="margin-left:10px; font-weight:700;">${escapeHTML(item.name)}</span>
                    </div>
                    <button class="btn-select-queue" data-no="${item.entryNo}" data-name="${escapeHTML(item.name)}" data-id="${item.id}">スコア入力</button>
                `;
                container.appendChild(div);
            });

            container.querySelectorAll('.btn-select-queue').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const no = e.target.getAttribute('data-no');
                    const name = e.target.getAttribute('data-name');
                    
                    document.getElementById('player-entry-no').value = no;
                    document.getElementById('player-name').value = name;
                    
                    switchTab('input');
                    document.getElementById('player-score-input').focus();
                });
            });
        }

        function renderAdminList() {
            const adminListEl = document.getElementById('admin-data-list');
            adminListEl.innerHTML = '';

            if (globalScores.length === 0) {
                adminListEl.innerHTML = '<p style="font-size:0.8rem; color:rgba(255,255,255,0.4); text-align:center; padding:10px;">データはありません</p>';
                return;
            }

            globalScores.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'admin-list-item';
                let noStr = item.entryNo ? `[No.${escapeHTML(String(item.entryNo))}] ` : '';
                let scoreStr = item.score !== null && item.score !== undefined ? `${item.score}pts` : '待機中';
                div.innerHTML = `
                    <span style="font-weight:600; color:#fff;">${noStr}${escapeHTML(item.name)} (${scoreStr})</span>
                    <button class="btn-delete" data-id="${item.id}" data-name="${escapeHTML(item.name)}">削除</button>
                `;
                adminListEl.appendChild(div);
            });

            // 削除ボタンの確実に動作するイベントバインディング
            adminListEl.querySelectorAll('.btn-delete').forEach(button => {
                button.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    const name = e.currentTarget.getAttribute('data-name');
                    
                    showConfirm(
                        'データの削除確認',
                        `「${name}」のスコアデータを削除してもよろしいですか？`,
                        async () => {
                            try {
                                await deleteDoc(doc(db, "scores", id));
                                showToast('データを削除しました');
                            } catch (error) {
                                console.error(error);
                                showToast('削除に失敗しました: ' + error.message, 'error');
                            }
                        }
                    );
                });
            });
        }

        async function submitScore() {
            const entryNoVal = document.getElementById('player-entry-no').value.trim();
            const entryNo = entryNoVal ? parseInt(entryNoVal, 10) : null;
            const name = document.getElementById('player-name').value.trim();
            const dept = document.getElementById('player-dept-select').value;
            const scoreVal = document.getElementById('player-score-input').value;
            const score = parseInt(scoreVal, 10);

            if (!name || isNaN(score)) { 
                showToast('名前とスコアを入力してください', 'error'); 
                return; 
            }

            let docId = entryNo ? `entry_${entryNo}` : `score_${Date.now()}`;
            const existing = globalScores.find(s => s.entryNo === entryNo);
            if (existing) {
                docId = existing.id;
            }

            try {
                await setDoc(doc(db, "scores", docId), {
                    entryNo: entryNo,
                    name: name,
                    dept: dept,
                    score: score,
                    updatedAt: new Date()
                }, { merge: true });

                document.getElementById('player-entry-no').value = '';
                document.getElementById('player-name').value = '';
                document.getElementById('player-score-input').value = '';
                showToast(`No.${entryNo || '-'} ${name} さんのスコア(${score}pts)を確定しました！`);
                switchTab('view');
            } catch (e) {
                console.error(e);
                showToast('送信エラーが発生しました: ' + e.message, 'error');
            }
        }

        function resetTicketCounter() {
            showConfirm(
                '整理券番号のリセット確認',
                '整理券のカウント番号を0にリセットします。よろしいですか？（※新しく発行される整理券がNo.1から再開されます）',
                async () => {
                    try {
                        await setDoc(doc(db, "system", "ticket_counter"), { current: 0 });
                        showToast('整理券カウンターを0にリセットしました！');
                    } catch (error) {
                        console.error(error);
                        showToast('リセットエラー: ' + error.message, 'error');
                    }
                }
            );
        }

        function checkPassword() {
            const pass = document.getElementById('admin-pass').value.trim();
            if (btoa(pass) === 'MjExMjEx') {
                document.getElementById('admin-auth').style.display = 'none';
                document.getElementById('score-form-container').style.display = 'block';
                document.getElementById('admin-pass').value = '';
                showToast('認証に成功しました');
            } else { 
                showToast('パスワードが違います', 'error'); 
            }
        }

        document.getElementById('filter-dept').addEventListener('change', renderRanking);
        document.getElementById('search-name').addEventListener('input', renderRanking);
        document.getElementById('search-queue').addEventListener('input', renderQueue);
        document.getElementById('btn-submit').addEventListener('click', submitScore);
        document.getElementById('btn-view').addEventListener('click', () => switchTab('view'));
        document.getElementById('btn-queue').addEventListener('click', () => switchTab('queue'));
        document.getElementById('btn-input').addEventListener('click', () => switchTab('input'));
        document.getElementById('btn-auth').addEventListener('click', checkPassword);
        document.getElementById('btn-lock').addEventListener('click', lockAdmin);
        document.getElementById('btn-reset-ticket').addEventListener('click', resetTicketCounter);

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`btn-${tabId}`).classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function lockAdmin() {
            document.getElementById('admin-auth').style.display = 'block';
            document.getElementById('score-form-container').style.display = 'none';
            showToast('画面をロックしました');
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
    </script>
</body>
</html>
