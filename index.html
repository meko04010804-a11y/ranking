<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランキング</title>
    <style>
        :root { 
            --primary-bg: #f0f7ff; 
            --accent-pink: #ff579f; 
            --accent-blue: #00cdff; 
            --accent-yellow: #fff34a; 
            --card-bg: rgba(255, 255, 255, 0.9); 
            --text-color: #3b226b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
        body { 
            /* さっきの画像のような、より鮮やかで幾何学的な光をイメージしたグラデーション */
            background: linear-gradient(135deg, #bbf2f6 0%, #ffcfe3 45%, #fff9b3 75%, #d1c2ff 100%); 
            color: var(--text-color); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }
        header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 600px; }
        h1 { 
            font-size: 2.4rem; 
            color: #3d5af1; 
            /* 文字の後ろに鮮やかな黄色と白の縁取りをつけて目立たせています */
            text-shadow: 3px 3px 0px var(--accent-yellow), -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff, 2px 2px 0px #fff;
            letter-spacing: 4px; 
            font-weight: 900;
        }
        .subtitle { font-size: 0.9rem; color: #7f60c4; font-weight: bold; letter-spacing: 1.5px; margin-top: 5px; }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--card-bg); 
            border: none;
            box-shadow: 0 10px 30px rgba(100, 120, 240, 0.25);
            border-radius: 20px; 
            padding: 24px; 
            backdrop-filter: blur(10px);
        }
        .tabs { display: flex; margin-bottom: 20px; background: rgba(61, 90, 241, 0.08); padding: 5px; border-radius: 30px; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #7f60c4; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 25px; transition: all 0.2s; }
        .tab-btn.active { color: #fff; background: linear-gradient(45deg, var(--accent-pink), #3d5af1); box-shadow: 0 4px 12px rgba(255, 87, 159, 0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .ranking-item { display: flex; align-items: center; padding: 14px 18px; margin-bottom: 12px; background: #fff; border-radius: 14px; border: 1px solid rgba(0,0,0,0.04); box-shadow: 0 4px 8px rgba(0,0,0,0.02); transition: transform 0.2s; }
        
        /* 上位3位はより鮮やかで派手めなグラデーション枠にしました */
        .ranking-item.rank-1 { background: linear-gradient(90deg, #fffbeb 0%, #fff 100%); border: 3px solid var(--accent-yellow); box-shadow: 0 4px 12px rgba(255, 243, 74, 0.4); }
        .ranking-item.rank-2 { background: linear-gradient(90deg, #f2f7fa 0%, #fff 100%); border: 3px solid var(--accent-blue); box-shadow: 0 4px 12px rgba(0, 205, 255, 0.2); }
        .ranking-item.rank-3 { background: linear-gradient(90deg, #fff2f8 0%, #fff 100%); border: 3px solid var(--accent-pink); box-shadow: 0 4px 12px rgba(255, 87, 159, 0.2); }
        
        .rank-num { font-size: 1.6rem; font-weight: 900; width: 40px; text-align: center; color: #7f60c4; }
        .rank-1 .rank-num { color: #ff9f43; font-size: 2.1rem; text-shadow: 1px 1px 0 #fff; }
        .rank-2 .rank-num { color: #0abde3; font-size: 1.9rem; }
        .rank-3 .rank-num { color: #ee5253; font-size: 1.8rem; }
        
        .player-info { flex-grow: 1; padding-left: 15px; }
        .player-name { font-size: 1.15rem; font-weight: bold; color: #231145; }
        .player-dept { font-size: 0.8rem; color: #7f60c4; font-weight: bold; margin-top: 2px; }
        .player-score { font-size: 1.6rem; font-weight: 900; color: #3d5af1; }
        .player-score span { font-size: 0.85rem; margin-left: 2px; color: #7f60c4; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.88rem; color: #4a2d8b; margin-bottom: 6px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #fff; border: 2px solid #d2c4e8; border-radius: 10px; color: var(--text-color); font-size: 1rem; font-weight: bold; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 8px rgba(0, 205, 255, 0.2); }
        
        .btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #00cdff, #3d5af1); border: none; border-radius: 30px; color: #fff; font-size: 1.15rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(61, 90, 241, 0.4); transition: all 0.2s; }
        .btn:active { transform: scale(0.97); }
        .btn-delete { background: #ff4747; padding: 6px 14px; border: none; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; box-shadow: 0 2px 8px rgba(255,71,71,0.3); }
        
        .qr-section { text-align: center; margin-top: 25px; font-size: 0.85rem; color: #694ba8; font-weight: bold; text-shadow: 1px 1px 0px #fff; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #fff; margin-top: 8px; border-radius: 10px; font-size: 0.95rem; border: 1px solid #dcd1ee; }
    </style>
</head>
<body>

    <header>
        <h1>RANKING</h1>
        <div class="subtitle">REALTIME LEADERBOARD</div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-view">ランキングを見る</button>
            <button class="tab-btn" id="btn-input">スコアを登録する</button>
        </div>

        <div id="tab-view" class="tab-content active">
            <div class="form-group">
                <label for="filter-dept">部門を切り替え</label>
                <select id="filter-dept">
                    <option value="all">すべての部門</option>
                    <option value="kids">キッズ部門</option>
                    <option value="general">一般部門</option>
                    <option value="pro">ウルスラ内部門</option>
                </select>
            </div>
            <ul class="ranking-list" id="ranking-list"></ul>
        </div>

        <div id="tab-input" class="tab-content">
            <div id="admin-auth">
                <div style="text-align: center; padding: 10px;">
                    <p style="margin-bottom: 15px; color: #4a2d8b; font-weight: bold;">スタッフ専用パスワード</p>
                    <input type="password" id="admin-pass" placeholder="パスワードを入力してください" style="text-align: center; margin-bottom: 20px;">
                    <button class="btn" id="btn-auth">認証する</button>
                </div>
            </div>

            <div id="score-form-container" style="display: none;">
                <div class="form-group">
                    <label for="player-name">プレイヤー名 / グループ名</label>
                    <input type="text" id="player-name" placeholder="例：チーム相葉">
                </div>
                <div class="form-group">
                    <label for="player-dept-select">エントリー部門</label>
                    <select id="player-dept-select">
                        <option value="kids">キッズ部門（ちっちゃい子）</option>
                        <option value="general" selected>一般部門</option>
                        <option value="pro">ガチ・運動部部門</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="player-score-input">獲得スコア (pts)</label>
                    <input type="number" id="player-score-input" placeholder="例：350">
                </div>
                <button class="btn" id="btn-submit">スコアを送信！</button>
                
                <div style="margin-top: 30px; border-top: 2px dashed #dcd1ee; padding-top: 20px;">
                    <p style="color: #3d5af1; font-weight: bold; font-size: 0.95rem; margin-bottom: 10px;">【データ管理】登録済みのデータ一覧</p>
                    <div id="admin-data-list"></div>
                </div>

                <p style="text-align: center; margin-top: 25px; font-size: 0.88rem; color: #ff4747; font-weight: bold; cursor: pointer;" id="btn-lock">← 画面をロックする</p>
            </div>
        </div>
    </div>

    <div class="qr-section">
        <p>QRコードを読み取るとリアルタイムでランキングがチェックできます！</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebaseの設定
        const firebaseConfig = {
            apiKey: "AIzaSyCsLgkXr51Dgcx5eixn-Zq8gZg4qziuQVo",
            authDomain: "html-53bb1.firebaseapp.com",
            projectId: "html-53bb1",
            storageBucket: "html-53bb1.firebasestorage.app",
            messagingSenderId: "486347499592",
            appId: "1:486347499592:web:17f94d3d064f42eaedd07d",
            measurementId: "G-CE36RP9WGH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let globalScores = [];

        const q = query(collection(db, "scores"), orderBy("score", "desc"));
        onSnapshot(q, (querySnapshot) => {
            globalScores = [];
            querySnapshot.forEach((d) => {
                globalScores.push({ id: d.id, ...d.data() });
            });
            renderRanking();
            renderAdminList();
        });

        function renderRanking() {
            const filterDept = document.getElementById('filter-dept').value;
            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = '';

            let filtered = [...globalScores];
            if (filterDept !== 'all') {
                filtered = filtered.filter(s => s.dept === filterDept);
            }

            filtered.forEach((item, index) => {
                const li = document.createElement('li');
                let rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                li.className = `ranking-item ${rankClass}`;

                let deptText = item.dept === 'kids' ? "キッズ" : item.dept === 'pro' ? "ガチ" : "一般";
                li.innerHTML = `
                    <div class="rank-num">${index + 1}</div>
                    <div class="player-info">
                        <div class="player-name">${escapeHTML(item.name)}</div>
                        <div class="player-dept">【${deptText}】</div>
                    </div>
                    <div class="player-score">${item.score}<span>pts</span></div>
                `;
                listEl.appendChild(li);
            });
        }

        function renderAdminList() {
            const adminListEl = document.getElementById('admin-data-list');
            adminListEl.innerHTML = '';

            if (globalScores.length === 0) {
                adminListEl.innerHTML = '<p style="color:#888; font-size:0.8rem;">データがありません</p>';
                return;
            }

            globalScores.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'admin-list-item';
                div.innerHTML = `
                    <span style="font-weight:bold; color:#231145;">${escapeHTML(item.name)} (${item.score}pts)</span>
                    <button class="btn-delete" data-id="${item.id}">削除</button>
                `;
                adminListEl.appendChild(div);
            });

            adminListEl.querySelectorAll('.btn-delete').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    if (confirm('このデータを削除してもよろしいですか？')) {
                        try {
                            await deleteDoc(doc(db, "scores", id));
                            alert('削除しました');
                        } catch (error) {
                            alert('削除に失敗しました');
                        }
                    }
                });
            });
        }

        async function submitScore() {
            const name = document.getElementById('player-name').value.trim();
            const dept = document.getElementById('player-dept-select').value;
            const score = parseInt(document.getElementById('player-score-input').value);

            if (!name || isNaN(score)) { alert('正しく入力してください'); return; }

            try {
                await addDoc(collection(db, "scores"), {
                    name: name,
                    dept: dept,
                    score: score,
                    createdAt: new Date()
                });
                document.getElementById('player-name').value = '';
                document.getElementById('player-score-input').value = '';
            } catch (e) {
                console.error(e);
                alert('送信エラーが発生しました');
            }
        }

        document.getElementById('filter-dept').addEventListener('change', renderRanking);
        document.getElementById('btn-submit').addEventListener('click', submitScore);
        document.getElementById('btn-view').addEventListener('click', () => switchTab('view'));
        document.getElementById('btn-input').addEventListener('click', () => switchTab('input'));
        document.getElementById('btn-auth').addEventListener('click', checkPassword);
        document.getElementById('btn-lock').addEventListener('click', lockAdmin);

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tabId === 'view') {
                document.getElementById('btn-view').classList.add('active');
                document.getElementById('tab-view').classList.add('active');
            } else {
                document.getElementById('btn-input').classList.add('active');
                document.getElementById('tab-input').classList.add('active');
            }
        }

        function checkPassword() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '211211') {
                document.getElementById('admin-auth').style.display = 'none';
                document.getElementById('score-form-container').style.display = 'block';
                document.getElementById('admin-pass').value = '';
            } else { alert('パスワードが違います'); }
        }

        function lockAdmin() {
            document.getElementById('admin-auth').style.display = 'block';
            document.getElementById('score-form-container').style.display = 'none';
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
    </script>
</body>
</html>
