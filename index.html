<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランキング</title>
    <style>
        :root { 
            --primary-bg: #f0f7ff; 
            --accent-pink: #ff579f; 
            --accent-blue: #00cdff; 
            --accent-yellow: #fff34a; 
            --card-bg: rgba(255, 255, 255, 0.9); 
            --text-color: #3b226b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
        body { 
            /* さっきの画像のような、より鮮やかで幾何学的な光をイメージしたグラデーション */
            background: linear-gradient(135deg, #bbf2f6 0%, #ffcfe3 45%, #fff9b3 75%, #d1c2ff 100%); 
            color: var(--text-color); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }
        header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 600px; }
        h1 { 
            font-size: 2.4rem; 
            color: #3d5af1; 
            /* 文字の後ろに鮮やかな黄色と白の縁取りをつけて目立たせています */
            text-shadow: 3px 3px 0px var(--accent-yellow), -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff, 2px 2px 0px #fff;
            letter-spacing: 4px; 
            font-weight: 900;
        }
        .subtitle { font-size: 0.9rem; color: #7f60c4; font-weight: bold; letter-spacing: 1.5px; margin-top: 5px; }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--card-bg); 
            border: none;
            box-shadow: 0 10px 30px rgba(100, 120, 240, 0.25);
            border-radius: 20px; 
            padding: 24px; 
            backdrop-filter: blur(10px);
        }
        .tabs { display: flex; margin-bottom: 20px; background: rgba(61, 90, 241, 0.08); padding: 5px; border-radius: 30px; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #7f60c4; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 25px; transition: all 0.2s; }
