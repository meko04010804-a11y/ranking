<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANKING</title>
    <style>
        :root { 
            /* 背景：黒〜濃紺のグラデーションベース */
            --bg-start: #050814;
            --bg-end: #0c132c;
            
            /* アクセントカラー */
            --color-blue: #00d2ff;
            --color-purple: #9d4edd;
            --color-cyan: #00f5d4; /* エメラルドグリーン */
            
            /* メダルカラー */
            --gold: #ffe066;
            --silver: #e2e8f0;
            --bronze: #e59866;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            background-image: 
                radial-gradient(circle at 20% 10%, rgba(0, 210, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(157, 78, 221, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(0, 245, 212, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            background-attachment: fixed;
            color: #ffffff; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            -webkit-font-smoothing: antialiased;
        }
        
        header { 
            text-align: center; 
            margin-bottom: 40px; 
            width: 100%; 
            max-width: 600px; 
            position: relative;
            padding-top: 20px;
        }
        
        header h1 { 
            font-size: 3rem; 
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
            position: relative;
            z-index: 2;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
            background: conic-gradient(from 150deg at 50% 0%, transparent, rgba(0, 210, 255, 0.15), rgba(157, 78, 221, 0.15), transparent 60deg);
            pointer-events: none;
            z-index: 1;
            filter: blur(10px);
        }
        
        .subtitle { 
            font-size: 0.85rem; 
            color: var(--color-blue); 
            margin-top: 8px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.8;
            z-index: 2;
            position: relative;
        }
        
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-radius: 16px; 
            padding: 25px; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn { flex: 1; padding: 14px; background: none; border: none; color: rgba(255, 255, 255, 0.4); font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.3s; position: relative; letter-spacing: 1px; }
        .tab-btn.active { color: #ffffff; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 15%; width: 70%; height: 2px; background: linear-gradient(90deg, var(--color-blue), var(--color-purple)); box-shadow: 0 0 10px var(--color-blue); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* フィルターと検索窓を横並びにするレイアウト */
        .filter-search-container {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .filter-search-container .form-group {
            flex: 1;
            min-width: 200px;
            margin-bottom: 0;
        }

        .ranking-list { list-style: none; }
        
        .ranking-item { 
            display: flex; 
            align-items: center; 
            padding: 18px 20px; 
            margin-bottom: 14px; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px; 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            scroll-margin-top: 20px; /* スクロール時の余白 */
        }
        .ranking-item:hover { transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.15); }
        
        /* エメラルドグリーンハイライト */
        .ranking-item.search-highlight {
            border: 2px solid var(--color-cyan) !important;
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.6) !important;
            background: rgba(0, 245, 212, 0.12) !important;
            transform: scale(1.02);
        }
        
        .rank-num { font-size: 1.3rem; font-weight: 800; width: 45px; text-align: center; color: rgba(255, 255, 255, 0.4); font-style: italic; position: relative; z-index: 2; }
        
        .rank-1 { 
            background: linear-gradient(135deg, rgba(255, 224, 102, 0.12) 0%, rgba(255, 224, 102, 0.03) 100%); 
            border: 1px solid rgba(255, 224, 102, 0.4);
            box-shadow: 0 0 20px rgba(255, 224, 102, 0.25);
        }
        .rank-1 .rank-num { color: var(--gold); font-size: 1.8rem; text-shadow: 0 0 10px rgba(255, 224, 102, 0.6); }
        .rank-1 .player-name { color: #fffdf0; text-shadow: 0 0 8px rgba(255, 224, 102, 0.3); }
        
        .rank-2 { 
            background: linear-gradient(135deg, rgba(226, 232, 240, 0.12) 0%, rgba(226, 232, 240, 0.03) 100%); 
            border: 1px solid rgba(226, 232, 240, 0.3);
            box-shadow: 0 0 15px rgba(226, 232, 240, 0.15);
        }
        .rank-2 .rank-num { color: var(--silver); font-size: 1.6rem; text-shadow: 0 0 8px rgba(226, 232, 240, 0.5); }
        
        .rank-3 { 
            background: linear-gradient(135deg, rgba(229, 152, 102, 0.12) 0%, rgba(229, 152, 102, 0.03) 100%); 
            border: 1px solid rgba(229, 152, 102, 0.3);
            box-shadow: 0 0 12px rgba(229, 152, 102, 0.12);
        }
        .rank-3 .rank-num { color: var(--bronze); font-size: 1.4rem; text-shadow: 0 0 8px rgba(229, 152, 102, 0.5); }
        
        .player-info { flex-grow: 1; padding-left: 15px; position: relative; z-index: 2; }
        .player-name { font-size: 1.2rem; font-weight: 700; color: #ffffff; }
        .entry-no-badge { font-size: 0.85rem; color: var(--color-cyan); font-weight: 600; margin-left: 6px; }
        .player-dept { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); margin-top: 4px; font-weight: 600; letter-spacing: 0.5px; }
        
        .player-score { font-size: 1.6rem; font-weight: 800; color: var(--color-blue); font-style: italic; position: relative; z-index: 2; text-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        .rank-1 .player-score { color: var(--gold); text-shadow: 0 0 10px rgba(255, 224, 102, 0.4); }
        .player-score span { font-size: 0.8rem; margin-left: 3px; color: rgba(255, 255, 255, 0.4); font-style: normal; font-weight: normal; }
        
        .form-group { margin-bottom: 22px; }
        label { display: block; font-size: 0.85rem; color: rgba(255, 255, 255, 0.7); margin-bottom: 8px; font-weight: 600; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: #ffffff; font-size: 1rem; transition: all 0.3s; }
        input:focus, select:focus { outline: none; border-color: var(--color-blue); box-shadow: 0 0 12px rgba(0, 210, 255, 0.3); background: rgba(0, 0, 0, 0.6); }
        
        .btn { width: 100%; padding: 15px; background: linear-gradient(90deg, var(--color-blue), var(--color-purple)); border: none; border-radius: 8px; color: #fff; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3); }
        .btn:hover { filter: brightness(1.1); box-shadow: 0 6px 20px rgba(0, 210, 255, 0.4); }
        .btn:active { transform: scale(0.99); }
        
        .btn-delete { background: #ef4444; padding: 6px 12px; border: none; border-radius: 4px; color: white; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .btn-delete:hover { background: #dc2626; }
        
        .qr-section { text-align: center; margin-top: 40px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.5px; line-height: 1.6; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(0,0,0,0.3); margin-top: 8px; border-radius: 6px; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header>
        <h1>RANKING</h1>
        <div class="subtitle">Festival Live Leaderboard</div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-view">ランキングを見る</button>
            <button class="tab-btn" id="btn-input">スコアを登録する</button>
        </div>

        <div id="tab-view" class="tab-content active">
            <!-- フィルターと自分の順位検索（横並び） -->
            <div class="filter-search-container">
                <div class="form-group">
                    <label for="filter-dept">部門切り替え</label>
                    <select id="filter-dept">
                        <option value="all">すべての部門</option>
                        <option value="kids">キッズ部門</option>
                        <option value="general">一般部門</option>
                        <option value="ursula">ウルスラ内部門</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="search-name">自分の順位を検索</label>
                    <input type="text" id="search-name" placeholder="名前 または 参加券のエントリーNo.">
                </div>
            </div>

            <ul class="ranking-list" id="ranking-list"></ul>
        </div>

        <div id="tab-input" class="tab-content">
            <div id="admin-auth">
                <div style="text-align: center; padding: 10px;">
                    <p style="margin-bottom: 15px; color: rgba(255, 255, 255, 0.8); font-weight: 600;">スタッフ専用パスワード</p>
                    <input type="password" id="admin-pass" placeholder="パスワードを入力してください" style="text-align: center; margin-bottom: 20px;">
                    <button class="btn" id="btn-auth">認証する</button>
                </div>
            </div>

            <div id="score-form-container" style="display: none;">
                <!-- エントリーNo項目を追加 -->
                <div class="form-group">
                    <label for="player-entry-no">エントリーNo.</label>
                    <input type="number" id="player-entry-no" placeholder="参加券のエントリーNo.">
                </div>
                <div class="form-group">
                    <label for="player-name">プレイヤー名 ひらがなフルネーム</label>
                    <input type="text" id="player-name" placeholder="例：やまだたろう">
                </div>
                <div class="form-group">
                    <label for="player-dept-select">エントリー部門</label>
                    <select id="player-dept-select">
                        <option value="kids">キッズ部門</option>
                        <option value="general" selected>一般部門</option>
                        <option value="ursula">ウルスラ内部門</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="player-score-input">獲得スコア (pts)</label>
                    <input type="number" id="player-score-input" placeholder="例：350">
                </div>
                <button class="btn" id="btn-submit">スコアを送信</button>
                
                <!-- 管理用データ削除エリア -->
                <div style="margin-top: 30px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 20px;">
                    <p style="color: var(--color-blue); font-weight: 600; font-size: 0.95rem; margin-bottom: 10px;">【データ管理】登録済みのデータ一覧</p>
                    <div id="admin-data-list"></div>
                </div>

                <p style="text-align: center; margin-top: 25px; font-size: 0.85rem; color: #ef4444; cursor: pointer; text-decoration: underline;" id="btn-lock">← 画面をロックする</p>
            </div>
        </div>
    </div>

    <div class="qr-section">
        <p>QRコードを読み取って自分の順位を定期的にチェック！上位には景品も！</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsLgkXr51Dgcx5eixn-Zq8gZg4qziuQVo",
            authDomain: "html-53bb1.firebaseapp.com",
            projectId: "html-53bb1",
            storageBucket: "html-53bb1.firebasestorage.app",
            messagingSenderId: "486347499592",
            appId: "1:486347499592:web:17f94d3d064f42eaedd07d",
            measurementId: "G-CE36RP9WGH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let globalScores = [];

        const q = query(collection(db, "scores"), orderBy("score", "desc"));
        onSnapshot(q, (querySnapshot) => {
            globalScores = [];
            querySnapshot.forEach((d) => {
                globalScores.push({ id: d.id, ...d.data() });
            });
            renderRanking();
            renderAdminList();
        });

        function renderRanking() {
            const filterDept = document.getElementById('filter-dept').value;
            const searchKeyword = document.getElementById('search-name').value.trim().toLowerCase();
            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = '';

            let filtered = [...globalScores];
            if (filterDept !== 'all') {
                filtered = filtered.filter(s => s.dept === filterDept);
            }

            let firstMatchElement = null; // スクロール対象エレメントの保持用

            filtered.forEach((item, index) => {
                const li = document.createElement('li');
                
                let rankClass = '';
                let medalEmoji = '';
                if (index === 0) { rankClass = 'rank-1'; medalEmoji = '🥇 '; }
                else if (index === 1) { rankClass = 'rank-2'; medalEmoji = '🥈 '; }
                else if (index === 2) { rankClass = 'rank-3'; medalEmoji = '🥉 '; }
                
                // 検索（名前 または エントリーNo）にヒットしているか判定
                const nameMatch = item.name && item.name.toLowerCase().includes(searchKeyword);
                const noMatch = item.entryNo && String(item.entryNo) === searchKeyword;
                const isMatched = searchKeyword !== '' && (nameMatch || noMatch);

                let highlightClass = isMatched ? ' search-highlight' : '';
                li.className = `ranking-item ${rankClass}${highlightClass}`;

                let deptText = item.dept === 'kids' ? "キッズ" : item.dept === 'ursula' ? "ウルスラ内" : "一般";
                let entryNoText = item.entryNo ? `<span class="entry-no-badge">[No.${escapeHTML(String(item.entryNo))}]</span>` : '';

                li.innerHTML = `
                    <div class="rank-num">${medalEmoji}${index + 1}</div>
                    <div class="player-info">
                        <div class="player-name">${escapeHTML(item.name)}${entryNoText}</div>
                        <div class="player-dept">【${deptText}部門】</div>
                    </div>
                    <div class="player-score">${item.score}<span>pts</span></div>
                `;
                
                listEl.appendChild(li);

                // 最初のヒット箇所を保持
                if (isMatched && !firstMatchElement) {
                    firstMatchElement = li;
                }
            });

            // 検索該当位置まで自動スクロール
            if (firstMatchElement) {
                firstMatchElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function renderAdminList() {
            const adminListEl = document.getElementById('admin-data-list');
            adminListEl.innerHTML = '';

            if (globalScores.length === 0) {
                adminListEl.innerHTML = '<p style="color:#888; font-size:0.8rem;">データがありません</p>';
                return;
            }

            globalScores.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'admin-list-item';
                let noStr = item.entryNo ? `[No.${escapeHTML(String(item.entryNo))}] ` : '';
                div.innerHTML = `
                    <span style="font-weight:600; color:#fff;">${noStr}${escapeHTML(item.name)} (${item.score}pts)</span>
                    <button class="btn-delete" data-id="${item.id}">削除</button>
                `;
                adminListEl.appendChild(div);
            });

            adminListEl.querySelectorAll('.btn-delete').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    if (confirm('このデータを削除してもよろしいですか？')) {
                        try {
                            await deleteDoc(doc(db, "scores", id));
                            alert('削除しました');
                        } catch (error) {
                            alert('削除に失敗しました');
                        }
                    }
                });
            });
        }

        async function submitScore() {
            const entryNo = document.getElementById('player-entry-no').value.trim();
            const name = document.getElementById('player-name').value.trim();
            const dept = document.getElementById('player-dept-select').value;
            const score = parseInt(document.getElementById('player-score-input').value);

            if (!name || isNaN(score)) { alert('名前とスコアを正しく入力してください'); return; }

            try {
                await addDoc(collection(db, "scores"), {
                    entryNo: entryNo ? parseInt(entryNo) : null,
                    name: name,
                    dept: dept,
                    score: score,
                    createdAt: new Date()
                });
                document.getElementById('player-entry-no').value = '';
                document.getElementById('player-name').value = '';
                document.getElementById('player-score-input').value = '';
                alert('スコアを送信しました');
            } catch (e) {
                console.error(e);
                alert('送信エラーが発生しました');
            }
        }

        document.getElementById('filter-dept').addEventListener('change', renderRanking);
        document.getElementById('search-name').addEventListener('input', renderRanking);
        document.getElementById('btn-submit').addEventListener('click', submitScore);
        document.getElementById('btn-view').addEventListener('click', () => switchTab('view'));
        document.getElementById('btn-input').addEventListener('click', () => switchTab('input'));
        document.getElementById('btn-auth').addEventListener('click', checkPassword);
        document.getElementById('btn-lock').addEventListener('click', lockAdmin);

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tabId === 'view') {
                document.getElementById('btn-view').classList.add('active');
                document.getElementById('tab-view').classList.add('active');
            } else {
                document.getElementById('btn-input').classList.add('active');
                document.getElementById('tab-input').classList.add('active');
            }
        }

        function checkPassword() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '211211') {
                document.getElementById('admin-auth').style.display = 'none';
                document.getElementById('score-form-container').style.display = 'block';
                document.getElementById('admin-pass').value = '';
            } else { alert('パスワードが違います'); }
        }

        function lockAdmin() {
            document.getElementById('admin-auth').style.display = 'block';
            document.getElementById('score-form-container').style.display = 'none';
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
    </script>
</body>
</html>
