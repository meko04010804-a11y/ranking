<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタッフ管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-10">

    <!-- ヘッダー -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bolt text-amber-400 text-xl"></i>
                <h1 class="font-bold text-lg text-amber-400">STAFF CONTROL PANEL</h1>
            </div>
            <!-- タブ切り替え -->
            <div class="flex gap-2">
                <button id="tabQueueBtn" class="bg-amber-500 text-slate-950 font-bold text-xs px-3 py-2 rounded-lg transition">
                    <i class="fa-solid fa-users mr-1"></i> 待機列・スコア登録
                </button>
                <button id="tabReissueBtn" class="bg-slate-800 text-slate-300 hover:text-white font-bold text-xs px-3 py-2 rounded-lg border border-slate-700 transition relative">
                    <i class="fa-solid fa-arrows-rotate mr-1"></i> 再発行承認
                    <span id="reissueBadge" class="hidden absolute -top-1.5 -right-1.5 bg-rose-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-extrabold animate-bounce">0</span>
                </button>
                <button id="tabRankingBtn" class="bg-slate-800 text-slate-300 hover:text-white font-bold text-xs px-3 py-2 rounded-lg border border-slate-700 transition">
                    <i class="fa-solid fa-trophy mr-1"></i> ランキング
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-4">

        <!-- トースト通知 -->
        <div id="toastMessage" class="hidden mb-4 p-3 rounded-xl text-center font-bold text-sm shadow-lg transition-all"></div>

        <!-- ================= タブ 1: 待機列 ＆ スコア入力 ================= -->
        <section id="sectionQueue" class="space-y-4">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                    <h2 class="text-xl font-bold text-amber-400 flex items-center gap-2">
                        <i class="fa-solid fa-list-ol"></i> 発行済み待機列
                    </h2>
                    <!-- 待機列 リアルタイム検索窓 -->
                    <div class="relative w-full sm:w-64">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="text" id="queueSearchInput" placeholder="番号・お名前で検索..." class="w-full bg-slate-800 text-slate-200 text-xs pl-8 pr-3 py-2 rounded-lg border border-slate-700 focus:outline-none focus:border-amber-400">
                    </div>
                </div>

                <p class="text-xs text-slate-400 mb-4">※ 該当のお客さまの「スコア入力」ボタンを押すと、記録を保存できます。</p>

                <!-- 整理券一覧 -->
                <div id="queueList" class="space-y-2 max-h-[60vh] overflow-y-auto pr-1">
                    <div class="text-center text-slate-500 py-8">データ読み込み中...</div>
                </div>
            </div>
        </section>

        <!-- ================= タブ 2: 再発行 承認申請リスト ================= -->
        <section id="sectionReissue" class="hidden space-y-4">
            <div class="bg-slate-900 p-6 rounded-2xl border border-amber-500/30 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-amber-400 flex items-center gap-2">
                        <i class="fa-solid fa-bell"></i> 再発行の承認申請
                    </h2>
                    <span class="text-xs text-slate-400">※ 許可すると古いデータは自動消去されます</span>
                </div>

                <div id="reissueRequestList" class="space-y-3">
                    <div class="text-center text-slate-500 py-6 text-sm">現在、承認待ちの再発行申請はありません。</div>
                </div>
            </div>
        </section>

        <!-- ================= タブ 3: ハイスコアランキング ================= -->
        <section id="sectionRanking" class="hidden space-y-4">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <h2 class="text-xl font-bold text-amber-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-trophy"></i> ハイスコアランキング
                </h2>
                <div id="rankingList" class="space-y-2">
                    <div class="text-center text-slate-500 py-8">データ読み込み中...</div>
                </div>
            </div>
        </section>

    </div>

    <!-- ================= スコア入力モーダル (ポップアップ) ================= -->
    <div id="scoreModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex justify-center items-center p-4">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl max-w-sm w-full shadow-2xl relative">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-white text-lg">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h3 class="text-lg font-bold text-amber-400 mb-1">スコアを記録する</h3>
            <p id="modalUserInfo" class="text-xs text-slate-300 font-semibold mb-4"></p>

            <form id="scoreForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">スコア (点数)</label>
                    <input type="number" id="modalScoreInput" required placeholder="例: 1500" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white font-bold text-lg focus:outline-none focus:border-amber-400">
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 rounded-xl transition shadow-lg">
                    スコアを保存する
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (ES Modules) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, updateDoc, setDoc, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let ticketsData = [];
        let scoresData = [];
        let selectedTicketForScore = null;

        // UI 要素参照
        const tabQueueBtn = document.getElementById('tabQueueBtn');
        const tabReissueBtn = document.getElementById('tabReissueBtn');
        const tabRankingBtn = document.getElementById('tabRankingBtn');

        const sectionQueue = document.getElementById('sectionQueue');
        const sectionReissue = document.getElementById('sectionReissue');
        const sectionRanking = document.getElementById('sectionRanking');

        const queueSearchInput = document.getElementById('queueSearchInput');
        const queueList = document.getElementById('queueList');
        const reissueRequestList = document.getElementById('reissueRequestList');
        const reissueBadge = document.getElementById('reissueBadge');
        const rankingList = document.getElementById('rankingList');
        const toastMessage = document.getElementById('toastMessage');

        const scoreModal = document.getElementById('scoreModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalUserInfo = document.getElementById('modalUserInfo');
        const modalScoreInput = document.getElementById('modalScoreInput');
        const scoreForm = document.getElementById('scoreForm');

        // タブ切替機能
        const activeTabClass = "bg-amber-500 text-slate-950 font-bold text-xs px-3 py-2 rounded-lg transition relative";
        const inactiveTabClass = "bg-slate-800 text-slate-300 hover:text-white font-bold text-xs px-3 py-2 rounded-lg border border-slate-700 transition relative";

        tabQueueBtn.addEventListener('click', () => {
            tabQueueBtn.className = activeTabClass;
            tabReissueBtn.className = inactiveTabClass;
            tabRankingBtn.className = inactiveTabClass;
            sectionQueue.classList.remove('hidden');
            sectionReissue.classList.add('hidden');
            sectionRanking.classList.add('hidden');
        });

        tabReissueBtn.addEventListener('click', () => {
            tabReissueBtn.className = activeTabClass;
            tabQueueBtn.className = inactiveTabClass;
            tabRankingBtn.className = inactiveTabClass;
            sectionReissue.classList.remove('hidden');
            sectionQueue.classList.add('hidden');
            sectionRanking.classList.add('hidden');
        });

        tabRankingBtn.addEventListener('click', () => {
            tabRankingBtn.className = activeTabClass;
            tabQueueBtn.className = inactiveTabClass;
            tabReissueBtn.className = inactiveTabClass;
            sectionRanking.classList.remove('hidden');
            sectionQueue.classList.add('hidden');
            sectionReissue.classList.add('hidden');
        });

        // トースト通知表示
        function showToast(msg, isSuccess = true) {
            toastMessage.textContent = msg;
            toastMessage.className = `mb-4 p-3 rounded-xl text-center font-bold text-sm shadow-lg ${isSuccess ? 'bg-emerald-600 text-white' : 'bg-rose-600 text-white'}`;
            toastMessage.classList.remove('hidden');
            setTimeout(() => toastMessage.classList.add('hidden'), 4000);
        }

        // Firebase 認証初期化
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (u) => {
            currentUser = u;
            if (u) {
                initTicketListeners();
                initScoresListeners();
            }
        });

        initAuth();

        // 整理券リアルタイム監視
        function initTicketListeners() {
            const ticketsCol = collection(db, 'artifacts', appId, 'public', 'data', 'tickets');

            onSnapshot(ticketsCol, (snapshot) => {
                ticketsData = [];
                snapshot.forEach((doc) => {
                    ticketsData.push({ id: doc.id, ...doc.data() });
                });

                ticketsData.sort((a, b) => a.number - b.number);

                renderQueueList();
                renderReissueList();
            }, (err) => console.error("Ticket Listen Error:", err));
        }

        // スコアデータリアルタイム監視
        function initScoresListeners() {
            const scoresCol = collection(db, 'artifacts', appId, 'public', 'data', 'scores');

            onSnapshot(scoresCol, (snapshot) => {
                scoresData = [];
                snapshot.forEach((doc) => {
                    scoresData.push({ id: doc.id, ...doc.data() });
                });

                scoresData.sort((a, b) => b.score - a.score);
                renderRankingList();
            }, (err) => console.error("Scores Listen Error:", err));
        }

        // 待機列のレンダリング (検索フィルター付き)
        function renderQueueList() {
            const query = queueSearchInput.value.trim().toLowerCase();

            const filtered = ticketsData.filter(t => {
                const matchNum = String(t.number).includes(query);
                const matchName = (t.name || "").toLowerCase().includes(query);
                return matchNum || matchName;
            });

            if (filtered.length === 0) {
                queueList.innerHTML = `<div class="text-center text-slate-500 py-8 text-sm">該当する整理券はありません。</div>`;
                return;
            }

            queueList.innerHTML = filtered.map(t => `
                <div class="bg-slate-800/80 p-3.5 rounded-xl border border-slate-700/80 flex justify-between items-center gap-2 hover:border-amber-500/50 transition">
                    <div class="flex items-center gap-3">
                        <span class="bg-amber-500 text-slate-950 font-black text-lg px-2.5 py-0.5 rounded-lg">#${t.number}</span>
                        <div>
                            <div class="font-bold text-white text-sm">${t.name} <span class="text-xs text-slate-400 font-normal">(${t.count}名)</span></div>
                        </div>
                    </div>
                    <button onclick="openScoreModal('${t.id}')" class="bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-300 border border-emerald-500/40 font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1">
                        <i class="fa-solid fa-pen"></i> スコア入力
                    </button>
                </div>
            `).join('');
        }

        // 検索窓入力イベント
        queueSearchInput.addEventListener('input', renderQueueList);

        // 再発行リストのレンダリング
        function renderReissueList() {
            const pendingTickets = ticketsData.filter(t => t.reissueStatus === 'pending');

            if (pendingTickets.length > 0) {
                reissueBadge.textContent = pendingTickets.length;
                reissueBadge.classList.remove('hidden');
            } else {
                reissueBadge.classList.add('hidden');
            }

            if (pendingTickets.length === 0) {
                reissueRequestList.innerHTML = `<div class="text-center text-slate-500 py-6 text-sm">現在、承認待ちの再発行申請はありません。</div>`;
                return;
            }

            reissueRequestList.innerHTML = pendingTickets.map(t => `
                <div class="bg-slate-800 p-4 rounded-xl border border-amber-500/40 flex flex-col sm:flex-row justify-between items-center gap-3 shadow-md">
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <span class="bg-amber-500 text-slate-950 font-black text-xl px-3 py-1 rounded-lg">#${t.number}</span>
                        <div>
                            <div class="font-bold text-white text-base">${t.name} <span class="text-xs text-slate-400">(${t.count}名)</span></div>
                            <div class="text-xs text-amber-300 font-semibold">⚠️ 再発行申請中</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                        <button onclick="approveReissue('${t.id}', ${t.number})" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-4 py-2 rounded-lg text-xs transition flex items-center gap-1 shadow">
                            <i class="fa-solid fa-check"></i> 許可 (旧データを削除)
                        </button>
                        <button onclick="rejectReissue('${t.id}')" class="bg-rose-600 hover:bg-rose-500 text-white font-bold px-3 py-2 rounded-lg text-xs transition flex items-center gap-1">
                            <i class="fa-solid fa-xmark"></i> 拒否
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ランキングのレンダリング
        function renderRankingList() {
            if (scoresData.length === 0) {
                rankingList.innerHTML = `<div class="text-center text-slate-500 py-8 text-sm">スコア記録はまだありません。</div>`;
                return;
            }

            rankingList.innerHTML = scoresData.map((s, idx) => {
                let badge = `<span class="font-bold text-slate-400 text-xs">${idx + 1}位</span>`;
                if (idx === 0) badge = `🥇 1位`;
                if (idx === 1) badge = `🥈 2位`;
                if (idx === 2) badge = `🥉 3位`;

                return `
                    <div class="bg-slate-800/80 p-3.5 rounded-xl border border-slate-700/80 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-amber-400 text-sm">${badge}</span>
                            <span class="font-bold text-slate-200 text-sm">${s.name}</span>
                            <span class="text-xs text-slate-400">（#${s.number}）</span>
                        </div>
                        <span class="font-mono font-black text-emerald-400 text-lg">${Number(s.score).toLocaleString()} pt</span>
                    </div>
                `;
            }).join('');
        }

        // モーダル処理：特定の整理券から選択して開く
        window.openScoreModal = (ticketId) => {
            const ticket = ticketsData.find(t => t.id === ticketId);
            if (!ticket) return;

            selectedTicketForScore = ticket;
            modalUserInfo.textContent = `#${ticket.number} ${ticket.name} 様`;
            modalScoreInput.value = '';
            scoreModal.classList.remove('hidden');
            modalScoreInput.focus();
        };

        closeModalBtn.addEventListener('click', () => {
            scoreModal.classList.add('hidden');
        });

        // スコアの登録送信
        scoreForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser || !selectedTicketForScore) return;

            const scoreVal = parseInt(modalScoreInput.value);
            if (isNaN(scoreVal)) return;

            try {
                const scoresCol = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
                await addDoc(scoresCol, {
                    number: selectedTicketForScore.number,
                    name: selectedTicketForScore.name,
                    score: scoreVal,
                    createdAt: Date.now()
                });

                showToast(`#${selectedTicketForScore.number} ${selectedTicketForScore.name} さんのスコア (${scoreVal} pt) を登録しました！`);
                scoreModal.classList.add('hidden');
            } catch (err) {
                console.error("Score submit error:", err);
                showToast("スコア登録に失敗しました", false);
            }
        });

        // 再発行の承認 (旧データ完全消去)
        window.approveReissue = async (ticketId, ticketNum) => {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tickets', ticketId);
                await deleteDoc(docRef);
                showToast(`整理券 #${ticketNum} の再発行を許可し、元のデータを削除しました。`);
            } catch (err) {
                console.error("Failed to approve & delete ticket:", err);
                showToast("処理に失敗しました", false);
            }
        };

        // 再発行の拒否
        window.rejectReissue = async (ticketId) => {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tickets', ticketId);
                await updateDoc(docRef, { reissueStatus: 'rejected' });
                showToast("再発行申請を拒否しました", false);
            } catch (err) {
                console.error("Failed to reject reissue:", err);
            }
        };
    </script>
</body>
</html>
